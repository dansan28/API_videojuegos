<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Videojuegos</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
        }

        h3{
            font-family: 'Orbitron', sans-serif;
        }

        .card{
            background: #1e293b;
            border: none;
            transition: transform .2s;
        }

        .card:hover{
            transform: scale(1.03);
        }

        .card img{
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h3><i class="fa-solid fa-gamepad"></i> Buscador de Videojuegos</h3>
    <p>Busca información de videojuegos en tiempo real</p>

    <div class="row mt-3">
        <div class="col-md-6">
            <input 
                type="text" 
                id="NombreJuego" 
                class="form-control" 
                placeholder="Ingresa el nombre del juego"
            >
        </div>
        <div class="col-md-2">
            <button class="btn btn-warning w-100" onclick="buscarJuego()">
                <i class="fa-solid fa-magnifying-glass"></i> Buscar
            </button>
        </div>
    </div>

    <div class="row my-5">
        <div id="resultado"></div>
    </div>

</div>

<script>
function buscarJuego(){
    const nombre = $("#NombreJuego").val().trim()

    if(!nombre){
        $("#resultado").html('<p style="color:#f87171;">Escribe el nombre de un juego</p>')
        return
    }

    $("#resultado").html('<p>Cargando...</p>')

    $.ajax({
        url: `https://api.rawg.io/api/games?key=TU_API_KEY_AQUI&search=${nombre}`,
        method: 'GET',
        success: function(data){

            if(!data.results.length){
                $("#resultado").html('<p>No se encontraron resultados</p>')
                return
            }

            let html = '<div class="row">'

            data.results.forEach(juego => {

                html += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 text-white">
                            <img src="${juego.background_image || 'https://via.placeholder.com/400x250'}" class="card-img-top">
                            <div class="card-body">
                                <h5 class="card-title">${juego.name}</h5>
                                <p>⭐ Rating: ${juego.rating}</p>
                                <p>📅 Lanzamiento: ${juego.released || 'Desconocido'}</p>
                                <p>🎮 Plataformas: ${juego.platforms ? juego.platforms.map(p => p.platform.name).join(', ') : 'N/A'}</p>
                            </div>
                        </div>
                    </div>
                `
            })

            html += '</div>'
            $("#resultado").html(html)
        },
        error: function(){
            $("#resultado").html('<p style="color:#f87171;">Error al consultar la API</p>')
        }
    })
}
</script>

</body>
</html>
