<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Videojuegos</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- CSS propio -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-gradient shadow-sm" data-bs-theme="dark">
  <div class="container">

    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#" onclick="volverInicio()">
      <i class="fa-solid fa-gamepad"></i>
      GameFinder
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContenido">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="volverInicio()">Inicio</a>
        </li>


        <li>    
            <a class="nav-link" href="#" onclick="cargarRecientes()">Recientes</a>
        </li>
        <li>    
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="cargarMejorValorados()">Top rating</a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="#" onclick="cargarProximos()">Próximos</a>
        </li>


      </ul>
    </div>

  </div>
</nav>
  
</nav>


<div class="container py-5">

    <!-- HERO BUSCADOR -->
    <div id="heroBusqueda" class="hero-inicio">

        <div class="logo-grande">
            <i class="fa-solid fa-gamepad"></i>
            <span>GameFinder</span>
        </div>

        <div class="buscador-box">
            <input 
                type="text" 
                id="NombreJuego" 
                class="form-control"
                placeholder="Busca un videojuego..."
            >

            <button class="btn btn-warning" onclick="buscarJuego()">
                Buscar
            </button>
        </div>

    </div>


    <div class="row my-5">
        <div id="resultado" class="w-100"></div>
    </div>

</div>


<div class="modal fade" id="modalJuego">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Detalles del juego</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalContenido">
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = "17ffcab810ce4802bcbc41f3b318b7fa"

function buscarJuego(){

    document.getElementById("heroBusqueda").classList.add("compacto")


    const nombre = $("#NombreJuego").val().trim()
    
    if(!nombre){
        $("#resultado").html('<p class="text-danger">Escribe el nombre de un juego</p>')
        return
    }

    $("#resultado").html('<p>Cargando...</p>')

    $.ajax({
        url: `https://api.rawg.io/api/games?key=17ffcab810ce4802bcbc41f3b318b7fa&search=${nombre}`,
        method: 'GET',
        success: function(data){

            if(!data.results.length){
                $("#resultado").html('<p>No se encontraron resultados</p>')
                return
            }

            let html = '<div class="row">'

            data.results.forEach(juego => {
                html += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 text-white">
                            <img src="${juego.background_image || 'https://via.placeholder.com/400x250'}" class="card-img-top">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${juego.name}</h5>
                                <p>⭐ ${juego.rating}</p>
                                <p>📅 ${juego.released || 'Desconocido'}</p>

                                <button class="btn btn-outline-light mt-auto" onclick="verDetalles(${juego.id})">
                                    Ver más
                                </button>
                            </div>
                        </div>
                    </div>
                `
            })

            html += '</div>'
            $("#resultado").html(html)
        }
    })
}

$(document).ready(function(){
    $("#NombreJuego").on("keypress", function(e){
        if(e.key === "Enter"){
            buscarJuego()
        }
    })
})

function verDetalles(id){
    $("#modalContenido").html("Cargando...")

    $.ajax({
        url: `https://api.rawg.io/api/games/${id}?key=17ffcab810ce4802bcbc41f3b318b7fa`,
        method: 'GET',
        success: function(data){

            let html = `
                <h3>${data.name}</h3>
                <p>${data.description_raw || 'Descripción no disponible'}</p>
                <hr>
                <p><strong>Géneros:</strong> ${data.genres.map(g => g.name).join(', ')}</p>
                <p><strong>Desarrolladores:</strong> ${data.developers.map(d => d.name).join(', ')}</p>
                <p><strong>Metacritic:</strong> ${data.metacritic || 'N/A'}</p>
                <p><strong>Tiempo de juego:</strong> ${data.playtime} hrs</p>
                <p><strong>Website:</strong> 
                    ${data.website ? `<a href="${data.website}" target="_blank">${data.website}</a>` : 'N/A'}
                </p>
            `

            $("#modalContenido").html(html)
            new bootstrap.Modal(document.getElementById('modalJuego')).show()
        }
    })
}

function volverInicio(){
    $("#NombreJuego").val("")
    $("#resultado").html("")
    document.getElementById("heroBusqueda").classList.remove("compacto")
    cargarPopulares()

}


function cargarPopulares(){

    $("#resultado").html('<p class="text-center text-secondary">Cargando juegos populares...</p>')

    $.ajax({
        url: `https://api.rawg.io/api/games?key=${API_KEY}&page_size=9`,
        method: 'GET',
        success: function(data){

            let html = '<h4 class="text-center mb-4 text-secondary">Juegos populares</h4><div class="row">'

            data.results.forEach(juego => {
                html += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 text-white">
                            <img src="${juego.background_image || 'https://via.placeholder.com/400x250'}" class="card-img-top">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${juego.name}</h5>
                                <p>⭐ ${juego.rating}</p>
                                <p>📅 ${juego.released || 'Desconocido'}</p>

                                <button class="btn btn-outline-light mt-auto" onclick="verDetalles(${juego.id})">
                                    Ver más
                                </button>
                            </div>
                        </div>
                    </div>
                `
            })

            html += '</div>'
            $("#resultado").html(html)
        }
    })
}

function cargarProximos(){

    const hoy = obtenerHoy()
    const finAno = obtenerFinDeAno()

    $("#resultado").html('<p class="text-center text-secondary">Cargando próximos lanzamientos...</p>')

    $.ajax({
        url: `https://api.rawg.io/api/games?key=${API_KEY}&ordering=released&dates=${hoy},${finAno}&page_size=9`,
        method: 'GET',
        success: function(data){
            mostrarJuegos(data.results, "Próximos lanzamientos")
        }
    })
}

$(document).ready(function(){
    cargarPopulares()
})


function mostrarJuegos(juegos, titulo){

    if(!juegos || !juegos.length){
        $("#resultado").html("<p class='text-center'>No hay resultados</p>")
        return
    }

    let html = `<h4 class="text-center mb-3 text-secondary">${titulo}</h4><div class="row">`

    juegos.forEach(juego => {
        html += `
            <div class="col-md-4 mb-4">
                <div class="card h-100 text-white card-animada">
                    <img src="${juego.background_image || 'https://via.placeholder.com/400x250'}" class="card-img-top">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${juego.name}</h5>
                        <p>⭐ ${juego.rating}</p>
                        <p>📅 ${juego.released || 'Desconocido'}</p>
                        <button class="btn btn-outline-light mt-auto" onclick="verDetalles(${juego.id})">
                            Ver más
                        </button>
                    </div>
                </div>
            </div>
        `
    })

    html += '</div>'
    $("#resultado").html(html)
}



function cargarRecientes(){

    const hoy = obtenerHoy()

    $("#resultado").html('<p class="text-center text-secondary">Cargando juegos recientes...</p>')

    $.ajax({
        url: `https://api.rawg.io/api/games?key=${API_KEY}&ordering=-released&dates=2000-01-01,${hoy}&page_size=9`,
        method: 'GET',
        success: function(data){
            mostrarJuegos(data.results, "Juegos recientes")
        }
    })
}

function cargarMejorValorados(){

    $("#resultado").html('<p class="text-center text-secondary">Cargando juegos mejor valorados...</p>')

    $.ajax({
        url: `https://api.rawg.io/api/games?key=${API_KEY}&ordering=-metacritic&page_size=9`,
        method: 'GET',
        success: function(data){
            mostrarJuegos(data.results, "Top juegos (Metacritic)")
        },
        error: function(){
            $("#resultado").html("<p class='text-danger text-center'>Error al cargar</p>")
        }
    })
}

function obtenerHoy(){
    const hoy = new Date()
    return hoy.toISOString().split("T")[0]
}

function obtenerFinDeAno(){
    const hoy = new Date()
    const fin = new Date(hoy.getFullYear(), 11, 31) 
    return fin.toISOString().split("T")[0]
}

</script>

</body>
</html>
